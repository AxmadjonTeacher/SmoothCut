# electron-builder configuration for SmoothCut.
#
# Notes:
# - Signs with the "Developer ID Application" identity below and notarizes
#   (mac.notarize: true) whenever APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/
#   APPLE_TEAM_ID are set — see apps/desktop/.env.local (gitignored, not in
#   this repo) and the README "Signing & notarization" section.
# - The Swift recorder binary is shipped OUTSIDE the asar via extraResources so
#   main/native.ts finds it at process.resourcesPath/bin/smoothcut-recorder.
# - @smoothcut/* workspace packages are bundled into out/ by electron-vite and
#   must NOT be collected into node_modules (native-win alone carries a ~500MB
#   rust target/ dir) — hence the negative patterns below.
appId: com.smoothcut.app
productName: SmoothCut
# No ${version} in artifactName: the website's download buttons link to
# GitHub's /releases/latest/download/<exact filename> permalink, which only
# stays stable across releases if the filename itself never changes.
directories:
  output: release
  buildResources: resources
files:
  - out/**
  - '!node_modules/@smoothcut/**'
asar: true
asarUnpack:
  - '**/*.node'
npmRebuild: false
# .smoothcut projects are DIRECTORY bundles: isPackage makes macOS treat them
# as opaque documents; on Windows the NSIS association only works for files,
# so double-open of a project folder is macOS-only (see README).
fileAssociations:
  - ext: smoothcut
    name: SmoothCut Project
    description: SmoothCut screen recording project
    role: Editor
    isPackage: true
# GitHub Releases is both the download source and the auto-update feed —
# electron-builder bakes this into app-update.yml at build time, and
# electron-updater (main/updater.ts) reads it with no server of our own to
# run. `electron-builder --publish always` (with a GH_TOKEN) creates/updates
# the release and uploads the installers + latest-mac.yml + blockmaps.
# NOTE: reliable auto-INSTALL on macOS needs the app code-signed (Squirrel.Mac
# checks the signature matches) — unsigned, this can check/download but not
# self-install; see the README "Auto-update" section and mac.identity below.
publish:
  provider: github
  owner: AxmadjonTeacher
  repo: SmoothCut
mac:
  category: public.app-category.video
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: 'Axmadjon Yodgorov (WLT22AM64S)'
  notarize: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  extendInfo:
    NSCameraUsageDescription: SmoothCut uses the camera only when you add a webcam to a recording.
    NSMicrophoneUsageDescription: SmoothCut uses the microphone only when you add a mic track to a recording.
    NSAudioCaptureUsageDescription: SmoothCut captures system audio only when you enable it for a recording.
    # There is no official screen-capture usage-string key (TCC shows its own
    # prompt); kept for App Store-style tooling that looks for one.
    NSScreenCaptureUsageDescription: SmoothCut records your screen to create polished screen recordings.
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  artifactName: '${productName}-mac-${arch}.${ext}'
  extraResources:
    - from: ../../packages/native-mac/bin
      to: bin
      filter:
        - smoothcut-recorder
win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch: [x64]
  artifactName: '${productName}-win-${arch}-setup.${ext}'
  # Copies the napi addon when it has been built (no-op filter miss otherwise).
  extraResources:
    - from: ../../packages/native-win
      to: bin
      filter:
        - smoothcut-native-win.win32-*.node
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
